name: build and publish

on:
  pull_request:
  push:
    tags:
      - v*

# Only allow one instance of this workflow for each PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
      - uses: hynek/build-and-inspect-python-package@v2

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    if: github.repository_owner == 'samueljsb' && github.ref_type == 'tag'

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".github/workflows/.python-version"
          cache: "pip"
      - run: python -m pip install .
      - id: package_version
        run: echo "version=$(python -c "from importlib.metadata import version; print(version('validate-commits'))")" >> "$GITHUB_OUTPUT"
      - name: check package version matches tag
        run: |
          [ "v${{ steps.package_version.outputs.version }}" = "${{ github.ref_name }}" ]
      - name: check changelog includes version
        run: grep '## \[${{ steps.package_version.outputs.version }}\]' < CHANGELOG.md

  pypi:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    needs: [build, verify]
    if: github.repository_owner == 'samueljsb' && github.ref_type == 'tag'
    environment: publish

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
